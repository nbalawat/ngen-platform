services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: ngen-postgres
    environment:
      POSTGRES_DB: ngen
      POSTGRES_USER: ngen
      POSTGRES_PASSWORD: ngen_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ngen"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ngen-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2-alpine
    container_name: ngen-nats
    ports:
      - "4222:4222"   # Client
      - "8222:8222"   # Monitoring
    command: ["--jetstream", "--store_dir", "/data", "-m", "8222"]
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Mock LLM Provider (for local dev / testing)
  # ---------------------------------------------------------------------------
  mock-llm:
    build:
      context: ../..
      dockerfile: libs/ngen-mock-llm/Dockerfile
    container_name: ngen-mock-llm
    ports:
      - "9100:9100"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9100/health')"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Application Services
  # ---------------------------------------------------------------------------
  tenant-service:
    build:
      context: ../..
      dockerfile: services/tenant-service/Dockerfile
    container_name: ngen-tenant-service
    environment:
      NGEN_DATABASE_URL: postgresql+asyncpg://ngen:ngen_dev_password@postgres:5432/ngen
      NGEN_DEBUG: "true"
      NATS_URL: nats://nats:4222
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 5

  model-registry:
    build:
      context: ../..
      dockerfile: services/model-registry/Dockerfile
    container_name: ngen-model-registry
    environment:
      NGEN_REGISTRY_DEBUG: "true"
      NATS_URL: nats://nats:4222
    ports:
      - "8001:8001"
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 5s
      timeout: 5s
      retries: 5

  model-gateway:
    build:
      context: ../..
      dockerfile: services/model-gateway/Dockerfile
    container_name: ngen-model-gateway
    env_file:
      - ../../.env
    environment:
      NGEN_GATEWAY_DEFAULT_UPSTREAM_URL: http://mock-llm:9100
      NGEN_GATEWAY_DEBUG: "true"
      NATS_URL: nats://nats:4222
      REDIS_URL: redis://redis:6379
    ports:
      - "8002:8002"
    depends_on:
      mock-llm:
        condition: service_healthy
      nats:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 5s
      timeout: 5s
      retries: 5

  workflow-engine:
    build:
      context: ../..
      dockerfile: services/workflow-engine/Dockerfile
    container_name: ngen-workflow-engine
    environment:
      WF_MODEL_GATEWAY_URL: http://model-gateway:8002
      WF_MCP_MANAGER_URL: http://mcp-manager:8005
      NGEN_DEFAULT_MODEL: claude-sonnet-4-6
      WF_LOG_LEVEL: INFO
      NATS_URL: nats://nats:4222
    ports:
      - "8003:8003"
    depends_on:
      model-gateway:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 5s
      timeout: 5s
      retries: 5

  governance-service:
    build:
      context: ../..
      dockerfile: services/governance-service/Dockerfile
    container_name: ngen-governance-service
    environment:
      NGEN_GOVERNANCE_DEBUG: "true"
      NATS_URL: nats://nats:4222
      REDIS_URL: redis://redis:6379
    ports:
      - "8004:8004"
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 5s
      timeout: 5s
      retries: 5

  mcp-manager:
    build:
      context: ../..
      dockerfile: services/mcp-manager/Dockerfile
    container_name: ngen-mcp-manager
    environment:
      NGEN_MCP_DEBUG: "true"
      NATS_URL: nats://nats:4222
      MODEL_GATEWAY_URL: http://model-gateway:8002
      NGEN_DOCUMENT_STORE_PATH: /app/data/documents
      VISION_AGENT_API_KEY: ${VISION_AGENT_API_KEY:-}
    volumes:
      - document_data:/app/data/documents
    ports:
      - "8005:8005"
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/health')"]
      interval: 5s
      timeout: 5s
      retries: 5

  onboarding-agent:
    build:
      context: ../..
      dockerfile: services/onboarding-agent/Dockerfile
    container_name: ngen-onboarding-agent
    environment:
      TENANT_SERVICE_URL: http://tenant-service:8000
      MODEL_REGISTRY_URL: http://model-registry:8001
      GOVERNANCE_URL: http://governance-service:8004
      MCP_MANAGER_URL: http://mcp-manager:8005
      NATS_URL: nats://nats:4222
    ports:
      - "8006:8006"
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8006/health')"]
      interval: 5s
      timeout: 5s
      retries: 5

  metering-service:
    build:
      context: ../..
      dockerfile: services/metering-service/Dockerfile
    container_name: ngen-metering-service
    environment:
      NATS_URL: nats://nats:4222
    ports:
      - "8007:8007"
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8007/health')"]
      interval: 5s
      timeout: 5s
      retries: 5

  portal:
    build:
      context: ../../portal
      dockerfile: Dockerfile
    container_name: ngen-portal
    ports:
      - "3000:3000"
    depends_on:
      - tenant-service
      - model-registry
      - model-gateway
      - workflow-engine
      - governance-service
      - mcp-manager
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  nats_data:
  document_data:
